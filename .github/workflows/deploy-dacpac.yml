name: Build and Deploy DACPAC

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: windows-latest
    env:
      DACPAC_PROJECT: todo-database.sqlproj
      BUILD_OUTPUT: build_output
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DACPAC
        run: |
          msbuild $DACPAC_PROJECT /p:Configuration=Release

      - name: Upload DACPAC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dacpac-artifact
          path: bin/Release/todo-database.dacpac

      - name: Download DACPAC Artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac-artifact
          path: ./dacpac-temp

      - name: Deploy DACPAC using azure/sql-action
        uses: Azure/sql-action@v2.2
        with:
          server-name: ${{ secrets.SQL_SERVER }}
          connection-string: "Server=${{ secrets.SQL_SERVER }};Database=${{ secrets.SQL_DATABASE }};Authentication=Active Directory Service Principal;User Id=${{ secrets.AZURE_CLIENT_ID }};Password=${{ secrets.AZURE_CLIENT_SECRET }};"
          path: ./dacpac-temp/todo-database.dacpac
          action: Publish
